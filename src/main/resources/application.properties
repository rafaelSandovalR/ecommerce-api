spring.application.name=ecommerce-api

# Connect to the 'ecommerce-postgres' container via the Host Port (5433)
spring.datasource.url=jdbc:postgresql://localhost:5433/ecommerce_db
spring.datasource.username=postgres
spring.datasource.password=${POSTGRES_PASSWORD}

# Hibernate Settings (Auto-create tables for now)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# "optional" prevents app from crashing if file is missing (Docker container)
# "classpath" tells Spring to look in the 'resources' folder
spring.config.import=optional:classpath:secrets.properties

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Cloudinary Config
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_SECRET}

# Stripe Config
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:dummy_test_secret_for_github_actions_123}

# Render Config
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Spring Mail Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:dummy_username_for_github_actions}
spring.mail.password=${MAIL_PASSWORD:dummy_password_for_github_actions}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true